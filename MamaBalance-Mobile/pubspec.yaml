name: mamabalance
description: "MamaBalance - A supportive app for mothers' mental well-being."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cloud_firestore: ^5.6.8
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.6.0
  firebase_core: ^3.13.0
  firebase_storage: ^12.4.10
  fl_chart: ^0.66.0
  url_launcher: ^6.2.6
  image_picker: ^1.0.0
  shared_preferences: ^2.0.15
  http: ^1.2.2
  google_generative_ai: ^0.4.7
  pdf: ^3.10.4
  printing: ^5.11.1
  path_provider: ^2.1.1
  permission_handler: ^11.3.0
  camera: ^0.11.0+2
  tflite_flutter: ^0.11.0
  # tflite_flutter_helper: ^0.4.3 (commented out for now)
  video_player: ^2.9.2
  intl: ^0.19.0
  app_badge_plus: ^1.2.9
  local_auth: ^2.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/MamaBalance_logo.png
    - assets/images/
    - assets/models/ppd_mood_model.tflite
    - assets/videos/family.mp4

# 🔹 Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/MamaBalance_icon.png"
  min_sdk_android: 21
